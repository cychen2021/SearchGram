# SearchGram Configuration File
# Copy this file to ~/.config/searchgram/config.toml and modify as needed

# Telegram API credentials
# Get these from https://my.telegram.org/
APP_ID = 321232123
APP_HASH = "your_app_hash_here"

# Bot token from @BotFather
TOKEN = "123456:your_bot_token_here"

# MeiliSearch configuration
MEILI_HOST = "http://localhost:7700"

# Limit MeiliSearch memory usage (optional)
# Useful if you have limited RAM
# Example: "800M" or "1G"
# MEILI_MAX_INDEXING_MEMORY = "800M"

# Your Telegram user ID(s)
# Get this from @userinfobot or @blog_update_bot
# Can be a single ID or a list of IDs for multiple accounts
OWNER_ID = "260260121"
# For multiple accounts, use a list:
# OWNER_ID = ["260260121", "5129702470"]

# Proxy configuration (optional)
# Uncomment and modify if you need proxy support
# [PROXY]
# scheme = "socks5"
# hostname = "localhost"
# port = 1080

# Session configuration
# Each session can have its own sync list
# If you only have one account, you can still use the old format (see below)
[sessions.searchgram_client]
# List of chat IDs or usernames to sync history from
sync = []
# Examples:
# sync = [123456, "@BennyThink", 789012]

# For multiple accounts:
# [sessions.account1]
# sync = [123456, "@username1"]
#
# [sessions.account2]
# sync = [789012, "@username2"]

# Legacy format (still supported for single account):
# If you don't use [sessions.*] sections, you can use the old format:
# sessions = ["searchgram_client"]
# [sync]
# "123456" = true
# "BennyThink" = true

# Whitelist configuration
# If empty, all chats are allowed
# You can use `PRIVATE`, `BOT`, `GROUP`, `SUPERGROUP`, `CHANNEL` to match chat types
[whitelist]
# Examples:
# "`PRIVATE`" = true
# "`CHANNEL`" = true
# "123456" = true
# "BennyThink" = true

# Blacklist configuration
# Chats in this list will be ignored even if in whitelist
[blacklist]
# Examples:
# "123456" = true
# "BennyThink" = true
